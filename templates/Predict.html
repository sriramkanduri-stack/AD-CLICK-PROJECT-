<!DOCTYPE html>
<html>
<head>
<title>Predict</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:rgba(255,255,255,0.1);
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,255,225,0.5);
    text-align:center;
}

h1{
    color:#00ffe1;
}

input, button{
    margin-top:15px;
    padding:10px;
    border:none;
    border-radius:8px;
}

button{
    background:#00ff99;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}
</style>

</head>

<body>

<div class="container">

<h1>🤖 Upload Test Data</h1>

<form action="/PredictAction" method="post" enctype="multipart/form-data">
    <input type="file" name="file"><br>
    <button type="submit">Predict</button>
</form>

<br>

<!-- BACK BUTTON -->
<button onclick="window.location.href='/Dashboard'">⬅ Back to Dashboard</button>

</div>

</body>
</html>
