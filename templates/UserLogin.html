<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #00c6ff);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
}

@keyframes bg {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

/* LOGIN BOX CENTER BIG */
.card {
    width: 450px;
    padding: 50px;
    border-radius: 25px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 35px rgba(0,255,255,0.3);
    text-align: center;
    color: white;
}

/* TITLE */
.card h2 {
    font-size: 32px;
    margin-bottom: 25px;
    color: #00ffff;
    text-shadow: 0 0 15px #00ffff;
}

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border: none;
    outline: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 15px;
}

input::placeholder {
    color: #e0e0e0;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 20px #00c6ff;
}

/* MESSAGE */
p {
    margin-top: 15px;
    color: #ffeb3b;
}

</style>

</head>

<body>

<div class="card">
    <h2>🔐 Login</h2>

    <form method="post" action="/UserLoginAction">
        <input type="text" name="t1" placeholder="Username" required>
        <input type="password" name="t2" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <p>{{ msg }}</p>
</div>

</body>
</html>
