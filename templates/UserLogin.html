<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ad Click Fraud Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='default.css') }}">
</head>
<body class="auth-page">
    <main class="auth-card">
        <a class="back-link" href="/index">Back to home</a>
        <p class="eyebrow">Secure Access</p>
        <h1>Login to the dashboard</h1>
        <form method="post" action="/UserLoginAction" class="form">
            <label for="username">Username</label>
            <input id="username" type="text" name="t1" placeholder="Enter username" required>
            <label for="password">Password</label>
            <input id="password" type="password" name="t2" placeholder="Enter password" required>
            <button class="button button-primary full" type="submit">Login</button>
        </form>
        {% if msg %}
        <p class="alert">{{ msg }}</p>
        {% endif %}
    </main>
</body>
</html>
