<html>
<head>
<title>Dashboard</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    display:flex;
}

/* SIDEBAR */
.sidebar {
    width:220px;
    height:100vh;
    background:#2c3e50;
    color:white;
    padding-top:20px;
    position:fixed;
}

.sidebar h2 {
    text-align:center;
}

.sidebar a {
    display:block;
    padding:12px 20px;
    color:white;
    text-decoration:none;
}

.sidebar a:hover {
    background:#34495e;
}

/* MAIN */
.main {
    margin-left:220px;
    padding:20px;
    width:100%;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    min-height:100vh;
}

/* CARD */
.card {
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

/* HEADER */
.header {
    font-size:22px;
    margin-bottom:20px;
}

/* BUTTON */
.btn {
    background:#3498db;
    color:white;
    padding:10px 20px;
    border-radius:8px;
    text-decoration:none;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Fraud System</h2>
    <a href="index">🏠 Home</a>
    <a href="Predict">📊 Predict</a>
    <a href="Logout">🚪 Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <div class="header">Dashboard</div>

    <div class="card">
        {{ msg|safe }}
    </div>

</div>

</body>
</html>
