<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Algorithms Graph</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='default.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="app-page">
    <nav class="app-topbar">
        <a class="brand" href="/Dashboard">Fraud Detection</a>
        <div class="nav-actions">
            <a href="/Dashboard">Dashboard</a>
            <a href="/Predict">Predict</a>
        </div>
    </nav>
    <main class="chart-shell">
        <div class="page-heading">
            <p class="eyebrow">Model Comparison</p>
            <h1>Algorithm performance</h1>
            <p class="muted">Accuracy and F-score comparison for all trained classifiers.</p>
        </div>
        <div class="chart-panel">
            <canvas id="myChart"></canvas>
        </div>
    </main>

    <script>
        const labels = {{ labels|tojson }};
        const accuracy = {{ accuracy|tojson }};
        const fscore = {{ fscore|tojson }};

        new Chart(document.getElementById('myChart'), {
            type: 'bar',
            data: {
                labels,
                datasets: [
                    {
                        label: 'Accuracy',
                        data: accuracy,
                        backgroundColor: 'rgba(29, 78, 216, 0.78)',
                        borderColor: 'rgba(29, 78, 216, 1)',
                        borderWidth: 1
                    },
                    {
                        label: 'F-Score',
                        data: fscore,
                        backgroundColor: 'rgba(16, 185, 129, 0.78)',
                        borderColor: 'rgba(16, 185, 129, 1)',
                        borderWidth: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        ticks: { color: '#475569' },
                        grid: { color: 'rgba(148, 163, 184, 0.25)' }
                    },
                    x: {
                        ticks: { color: '#475569' },
                        grid: { display: false }
                    }
                },
                plugins: {
                    legend: {
                        labels: { color: '#0f172a' }
                    }
                }
            }
        });
    </script>
</body>
</html>
