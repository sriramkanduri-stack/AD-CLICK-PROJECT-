<!DOCTYPE html>
<html>
<head>
    <title>All Algorithms Graph</title>
    <style>
        .back-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            background: #ff4d4d;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:#0f2027; color:white; text-align:center;">

<h2>📊 All Algorithms Performance</h2>

<!-- SAFE BACK BUTTON -->
<a href="/Dashboard">
    <button class="back-btn">
        🔙 Back
    </button>
</a>

<canvas id="myChart" width="800" height="400"></canvas>

<script>

// ✅ SIMPLE STATIC DATA (NO ERROR)
const labels = [
'Logistic Regression','Decision Tree','Random Forest','KNN','ANN',
'Gradient Boosting','LightGBM','XGBoost','Naive Bayes','SVM','CNN','DNN','RNN'
];

const accuracy = [97.267,98.933,77.467,73.200,72.400,98.000,98.533,98.667,89.333,73.800,95.667,73.800,98.733];

const fscore = [96.457,98.639,59.310,43.215,55.523,97.475,98.137,98.304,87.606,42.463,94.599,42.463,98.382];

// ✅ ONLY 2 DATASETS (clean look)
const data = {
    labels: labels,
    datasets: [
        {
            label: 'Accuracy',
            data: accuracy
        },
        {
            label: 'FScore',
            data: fscore
        }
    ]
};

// ✅ SIMPLE ANIMATION
const config = {
    type: 'bar',
    data: data,
    options: {
        animation: {
            duration: 1000   // smooth but simple
        }
    }
};

// ✅ DRAW GRAPH
new Chart(document.getElementById('myChart'), config);

</script>

</body>
</html>
